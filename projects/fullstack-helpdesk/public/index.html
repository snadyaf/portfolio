<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helpdesk inteligente</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f8fafc; color: #0f172a; }
    .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 20px 50px rgba(15,23,42,0.08); max-width: 720px; margin: auto; }
    button { background: #166534; border: none; color: white; padding: 12px 18px; border-radius: 999px; cursor: pointer; }
    input, textarea { width: 100%; margin-top: 12px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; }
    .ticket { border: 1px solid #e2e8f0; padding: 16px; border-radius: 16px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Helpdesk inteligente</h1>
    <p>Crie tickets e veja a lista atualizada via API Node.js.</p>

    <label>Título</label>
    <input id="title" placeholder="Descreva o problema" />

    <label>Descrição</label>
    <textarea id="description" rows="4" placeholder="Detalhes do chamado"></textarea>

    <button id="create">Criar ticket</button>

    <section id="tickets" aria-live="polite"></section>
  </div>
  <script src="app.js"></script>
</body>
</html>
